name: Manual Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        type: choice
        options:
          - APP
          - HPC
          - TEST
        default: APP
      qt_variant:
        description: Qt variant
        required: true
        type: choice
        options:
          - qt6
          - qt5-qwt616
          - qt5-qwt630
        default: qt6
      build_set:
        description: Which set of builds to run
        required: true
        type: choice
        options:
          - full
          - desktop-only
          - linux-only
          - single-platform
        default: single-platform
      platform:
        description: Platform to use when build_set is single-platform
        required: true
        type: choice
        options:
          - macos-arm64
          - windows
          - ubuntu
        default: ubuntu

permissions:
  contents: read

concurrency:
  group: manual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      artifact_prefix: ${{ steps.meta.outputs.artifact_prefix }}

    steps:
      - name: Build matrix JSON
        id: matrix
        shell: bash
        env:
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_QT_VARIANT: ${{ inputs.qt_variant }}
          INPUT_BUILD_SET: ${{ inputs.build_set }}
          INPUT_PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail

          qt_flag() {
            case "${INPUT_QT_VARIANT}" in
              qt6) printf '%s' '--qt6' ;;
              qt5-qwt616) printf '%s' '--qt5-qwt616' ;;
              qt5-qwt630) printf '%s' '--qt5-qwt630' ;;
              *)
                echo "Unsupported qt_variant: ${INPUT_QT_VARIANT}" >&2
                exit 1
                ;;
            esac
          }

          make_entry() {
            local name="$1"
            local runs_on="$2"
            local shell_name="$3"
            local cache_suffix="$4"
            local build_cmd="$5"
            local artifact_pattern="$6"

            cat <<EOF
          {
            "name": "${name}",
            "runs_on": "${runs_on}",
            "shell": "${shell_name}",
            "cache_suffix": "${cache_suffix}",
            "build_cmd": ${build_cmd},
            "artifact_pattern": "${artifact_pattern}"
          }
          EOF
          }

          make_linux_cmd() {
            printf '"./scripts/build.sh %s %s --pkg"' "$(qt_flag)" "${INPUT_PROFILE}"
          }

          make_macos_cmd() {
            printf '"./scripts/build.sh %s %s --pkg"' "$(qt_flag)" "${INPUT_PROFILE}"
          }

          make_windows_cmd() {
            printf '".\\scripts\\build.bat %s %s --pkg"' "$(qt_flag)" "${INPUT_PROFILE}"
          }

          case "${INPUT_BUILD_SET}" in
            full)
              ENTRIES="$(
                make_entry \
                  "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "macos-15" \
                  "bash" \
                  "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_macos_cmd)" \
                  "build/**/*.pkg"
                printf ','
                make_entry \
                  "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "windows-2025" \
                  "pwsh" \
                  "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_windows_cmd)" \
                  "build/**/*.exe"
                printf ','
                make_entry \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "ubuntu-24.04" \
                  "bash" \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_linux_cmd)" \
                  "build/**/*.tar.gz"
              )"
              ;;
            desktop-only)
              ENTRIES="$(
                make_entry \
                  "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "macos-15" \
                  "bash" \
                  "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_macos_cmd)" \
                  "build/**/*.pkg"
                printf ','
                make_entry \
                  "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "windows-2025" \
                  "pwsh" \
                  "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_windows_cmd)" \
                  "build/**/*.exe"
                printf ','
                make_entry \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "ubuntu-24.04" \
                  "bash" \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_linux_cmd)" \
                  "build/**/*.tar.gz"
              )"
              ;;
            linux-only)
              ENTRIES="$(
                make_entry \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "ubuntu-24.04" \
                  "bash" \
                  "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                  "$(make_linux_cmd)" \
                  "build/**/*.tar.gz"
              )"
              ;;
            single-platform)
              case "${INPUT_PLATFORM}" in
                macos-arm64)
                  ENTRIES="$(
                    make_entry \
                      "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "macos-15" \
                      "bash" \
                      "macos-arm64-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "$(make_macos_cmd)" \
                      "build/**/*.pkg"
                  )"
                  ;;
                windows)
                  ENTRIES="$(
                    make_entry \
                      "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "windows-2025" \
                      "pwsh" \
                      "windows-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "$(make_windows_cmd)" \
                      "build/**/*.exe"
                  )"
                  ;;
                ubuntu)
                  ENTRIES="$(
                    make_entry \
                      "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "ubuntu-24.04" \
                      "bash" \
                      "ubuntu-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" \
                      "$(make_linux_cmd)" \
                      "build/**/*.tar.gz"
                  )"
                  ;;
                *)
                  echo "Unsupported platform: ${INPUT_PLATFORM}" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "Unsupported build_set: ${INPUT_BUILD_SET}" >&2
              exit 1
              ;;
          esac

          MATRIX_JSON="{\"include\":[${ENTRIES}]}"
          echo "matrix_json=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

      - name: Set artifact metadata
        id: meta
        shell: bash
        env:
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_QT_VARIANT: ${{ inputs.qt_variant }}
          INPUT_BUILD_SET: ${{ inputs.build_set }}
        run: |
          set -euo pipefail
          echo "artifact_prefix=ultrascan-manual-${INPUT_BUILD_SET,,}-${INPUT_QT_VARIANT}-${INPUT_PROFILE,,}" >> "$GITHUB_OUTPUT"

  build:
    name: Run manual build
    needs: prepare
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-build-matrix.yml@4184003cb8c9737f72d487b7502f4da57e2f5bc5
    with:
      artifact_name_prefix: ${{ needs.prepare.outputs.artifact_prefix }}
      artifact_retention_days: 7
      matrix_json: ${{ needs.prepare.outputs.matrix_json }}
    secrets: inherit

